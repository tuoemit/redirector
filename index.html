<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
  </head>
  <body>
    <p>
      If you are not automatically redirected, follow this
      <a href="javascript:void(0);" onclick="redirect()">link</a>.
    </p>

    <script>
      function redirect() {
        const destination = "v3";
        
        // Clean the root URL by removing index.html and stripping query/hashes
        let rootURL = window.location.href.split("?")[0].split("#")[0];
        if (rootURL.endsWith("index.html")) {
          rootURL = rootURL.replace("index.html", "");
        }

        // Ensure the root URL always ends with a trailing slash so /v3/ appends cleanly
        if (!rootURL.endsWith("/")) {
          rootURL += "/";
        }

        // Assemble the final target path
        const finalURL = `${rootURL}${destination}/${window.location.search}`;

        // Execute the redirect
        window.location.replace(finalURL);
      }

      // Optimization: Run immediately instead of waiting for body onload images/assets to load
      redirect();
    </script>
  </body>
</html>

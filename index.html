<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Launching...</title>

<style>
body{
    margin:0;
    height:100vh;
    display:grid;
    place-items:center;
    font-family:system-ui,-apple-system,sans-serif;
    background:#f6f8fa;
    color:#24292e;
}
.box{
    text-align:center;
    padding:20px;
}
a,button{
    display:inline-block;
    margin-top:10px;
    padding:10px 16px;
    border-radius:8px;
    border:0;
    cursor:pointer;
    text-decoration:none;
    font-size:14px;
}
a{color:#0366d6}
button{
    background:#0366d6;
    color:#fff;
}
</style>
</head>
<body>

<div class="box">
    <h2>Launching...</h2>
    <p>Attempting to open the target application.</p>

    <p>
        If nothing happens,
        <a id="fallback" href="#">click here</a>.
    </p>

    <button id="open">Open Manually</button>
</div>

<script>
(() => {

    const target = new URLSearchParams(location.search).get("url");

    if (!target) {
        document.body.innerHTML =
            "<h2>Error</h2><p>No URL provided.</p>";
        return;
    }

    const url = decodeURIComponent(target);

    const fallback = document.getElementById("fallback");
    const openBtn = document.getElementById("open");

    fallback.href = url;

    function launch() {

        // Method 1
        location.href = url;

        // Method 2
        setTimeout(() => location.replace(url), 100);

        // Method 3
        setTimeout(() => {
            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            iframe.src = url;
            document.body.appendChild(iframe);
        }, 200);

        // Method 4
        setTimeout(() => window.open(url, "_self"), 300);
    }

    fallback.onclick = e => {
        e.preventDefault();
        launch();
    };

    openBtn.onclick = launch;

    launch();

})();
</script>

</body>
</html>

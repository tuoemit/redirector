<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
  </head>
  <body>
    <p>
      If you are not automatically redirected, follow this
      <a href="javascript:void(0);" id="fallback-link">link</a>.
    </p>

    <script>
      function redirect() {
        // 1. Get the current query string
        const queryString = window.location.search;
        
        // 2. Find where the target url parameter begins
        const targetMarker = "?url=";
        const index = queryString.indexOf(targetMarker);
        
        let finalTarget = "";

        if (index !== -1) {
          // Extract everything immediately following "?url="
          const rawUrl = queryString.substring(index + targetMarker.length);
          // Decode it cleanly in case it arrives partially or fully encoded
          finalTarget = decodeURIComponent(rawUrl);
        } else {
          // Fallback check if it was formatted with an ampersand or slightly differently
          const urlParams = new URLSearchParams(queryString);
          finalTarget = urlParams.get('url');
        }

        // 3. Error handle if no destination was found
        if (!finalTarget) {
          document.body.innerHTML = "<h2>Error: No valid configuration URL found.</h2>";
          return;
        }

        // 4. Update the fallback link on the page just in case automation is blocked
        document.getElementById("fallback-link").href = finalTarget;

        // 5. Instantly forward the user to the application link scheme
        window.location.replace(finalTarget);
      }

      // Execute the logic right away
      redirect();
    </script>
  </body>
</html>

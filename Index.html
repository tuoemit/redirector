<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clash Redirector</title>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            let url = params.get('url');
            let name = params.get('name') || 'config';
            
            if (!url) {
                document.body.innerHTML = `
                    <h1>❌ Error</h1>
                    <p>Missing required parameter: <code>url</code></p>
                    <p>Usage: <code>?url=https://example.com/config.yaml&name=MyConfig</code></p>
                `;
                return;
            }
            
            // Handle potential double-encoding
            try {
                url = decodeURIComponent(url);
            } catch(e) {}
            
            const clashUrl = `clash://install-config?url=${encodeURIComponent(url)}&name=${encodeURIComponent(name)}`;
            
            // Try to redirect
            window.location.href = clashUrl;
            
            // Fallback for browsers that block custom protocols
            setTimeout(() => {
                if (document.hidden !== undefined) {
                    document.body.innerHTML = `
                        <div style="text-align: center; padding: 50px; font-family: sans-serif;">
                            <h2>⚠️ Redirect Failed</h2>
                            <p>Your browser may not support the <code>clash://</code> protocol.</p>
                            <p>Please <a href="${clashUrl}">click here</a> to manually open in Clash.</p>
                            <hr>
                            <p><strong>Config URL:</strong><br>
                            <code style="word-break: break-all;">${url}</code></p>
                            <p><strong>Name:</strong> ${name}</p>
                        </div>
                    `;
                }
            }, 2000);
        })();
    </script>
</head>
<body>
    <p>Redirecting to Clash...</p>
</body>
</html>
